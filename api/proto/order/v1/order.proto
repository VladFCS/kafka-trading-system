syntax = "proto3";

package order.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/vladfc/kafka-trading-system/gen/order/v1;orderv1";

service OrderService {
  rpc CreateOrder (CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrderByID (GetOrderRequest) returns (GetOrderResponse);
  rpc ListOrders (ListOrdersRequest) returns (ListOrdersResponse);
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING = 1;
  ORDER_STATUS_FILLED = 2;
  ORDER_STATUS_CANCELED = 3;
}

enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  ORDER_SIDE_BUY = 1;
  ORDER_SIDE_SELL = 2;
}

message Order {
  string order_id = 1;
  string customer_id = 2;
  string symbol = 3;
  // Price is stored in cents. Example: 450.44 -> 45044.
  int64 price_cents = 4;
  // Quantity is stored with scale 100. Example: 2.25 -> 225.
  int64 quantity_units = 5;
  OrderStatus status = 6;
  OrderSide side = 7;
  int64 remaining_quantity_units = 8;
  optional string idempotency_key = 9;
  google.protobuf.Timestamp canceled_at = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message CreateOrderRequest {
  string customer_id = 1;
  string symbol = 2;
  int64 price_cents = 3;
  int64 quantity_units = 4;
  OrderSide side = 5;
  optional string idempotency_key = 6;
}

message CreateOrderResponse {
  Order order = 1;
}

message GetOrderRequest {
  string order_id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message ListOrdersRequest {
  string customer_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListOrdersResponse {
  repeated Order orders = 1;
}
